services:
  app:
    image: ${YLOADER_IMAGE:-yloader}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: yloader
    restart: unless-stopped
    ports:
      - "${YLOADER_FRONTEND_PORT:-8080}:8080"
    environment:
      - DOWNLOAD_DIR=/downloads
      - DB_PATH=/app/data/metadata.db
      - FRONTEND_DIST_DIR=/app/frontend/dist
      - FFMPEG_PATH=/usr/local/bin/ffmpeg
      - FFPROBE_PATH=/usr/local/bin/ffprobe
      - YT_DLP_MANAGED_BY_YLOADER=1
      - FFMPEG_MANAGED_BY_YLOADER=1
      - YLOADER_RUNTIME_TARGET=docker
      - YLOADER_ALLOW_BROWSER_COOKIE_IMPORT=0
    volumes:
      - ./downloads:/downloads
      - ./backend-data:/app/data
