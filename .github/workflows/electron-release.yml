name: Electron Build and Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to GitHub Release (only useful when running on a v-tag ref)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
            buildArgs: --win nsis
            artifactPattern: release/*.exe
          - name: macOS DMG
            os: macos-latest
            buildArgs: --mac dmg
            artifactPattern: release/*.dmg
          - name: Linux AppImage
            os: ubuntu-latest
            buildArgs: --linux AppImage
            artifactPattern: release/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:electron -- --publish never ${{ matrix.buildArgs }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifactPattern }}
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true')

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-upload
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          # Avoid duplicate release asset names across matrix artifacts
          # (for example builder-debug.yml), which trigger HTTP 422 on upload.
          declare -A seen_by_name
          upload_files=()

          for file in "${files[@]}"; do
            name="$(basename "$file")"

            if [[ "$name" == "builder-debug.yml" ]]; then
              echo "Skipping debug-only asset: $file"
              continue
            fi

            if [[ -n "${seen_by_name[$name]+x}" ]]; then
              first_file="${seen_by_name[$name]}"
              first_hash="$(sha256sum "$first_file" | awk '{print $1}')"
              this_hash="$(sha256sum "$file" | awk '{print $1}')"

              if [[ "$first_hash" == "$this_hash" ]]; then
                echo "Skipping duplicate asset '$name' (identical content): $file"
              else
                echo "::warning::Skipping duplicate asset '$name' with different content. Keeping $first_file and skipping $file"
              fi

              continue
            fi

            seen_by_name[$name]="$file"
            upload_files+=("$file")
            cp "$file" "release-upload/$name"
          done

          if [ "${#upload_files[@]}" -eq 0 ]; then
            echo "No release assets remain after filtering duplicates."
            exit 1
          fi

          if [ "${#upload_files[@]}" -eq 0 ]; then
            echo "No release assets remain after filtering duplicates."
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-upload/*
          fail_on_unmatched_files: true
