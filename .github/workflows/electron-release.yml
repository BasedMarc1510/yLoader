name: Electron Build and Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to GitHub Release (only useful when running on a v-tag ref)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
            buildArgs: --win nsis
            artifactPattern: release/*.exe
          - name: macOS DMG
            os: macos-latest
            buildArgs: --mac dmg
            artifactPattern: release/*.dmg
          - name: Linux AppImage
            os: ubuntu-latest
            buildArgs: --linux AppImage
            artifactPattern: release/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:electron -- --publish never ${{ matrix.buildArgs }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifactPattern }}
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true')

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish assets via GitHub CLI
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          prerelease_args=()
          if [[ "$TAG_NAME" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes "${prerelease_args[@]}"
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber
