name: Electron Build and Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to GitHub Release (only useful when running on a v-tag ref)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
            buildArgs: --win nsis
            artifactPattern: release/*.exe
          - name: macOS DMG
            os: macos-latest
            buildArgs: --mac dmg
            artifactPattern: release/*.dmg
          - name: Linux AppImage
            os: ubuntu-latest
            buildArgs: --linux AppImage
            artifactPattern: release/*.AppImage

    env:
      # Publish only for tag pushes, or for manual runs on a v-tag ref with publish=true.
      SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages (test mode, no release publish)
        if: env.SHOULD_PUBLISH != 'true'
        run: npm run build:electron -- --publish never ${{ matrix.buildArgs }}

      - name: Build packages and publish release assets
        if: env.SHOULD_PUBLISH == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:electron -- --publish always ${{ matrix.buildArgs }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifactPattern }}
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14
