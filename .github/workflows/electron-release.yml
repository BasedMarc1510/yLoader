name: Electron Build and Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to GitHub Release (only useful when running on a v-tag ref)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
            buildArgs: --win nsis
            artifactPattern: release/*.exe
          - name: macOS DMG
            os: macos-latest
            buildArgs: --mac dmg
            artifactPattern: release/*.dmg
          - name: Linux AppImage
            os: ubuntu-latest
            buildArgs: --linux AppImage
            artifactPattern: release/*.AppImage

    env:
      # Publish only for tag pushes, or for manual runs on a v-tag ref with publish=true.
      SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:electron -- --publish never ${{ matrix.buildArgs }}

      - name: Publish release assets
        if: env.SHOULD_PUBLISH == 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ matrix.artifactPattern }}
            release/*.yml
            release/*.blockmap
          fail_on_unmatched_files: false

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifactPattern }}
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14
