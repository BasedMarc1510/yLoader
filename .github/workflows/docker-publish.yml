name: Docker Build and Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish image to Docker Hub (recommended only on v-tag refs)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          if [ "${SHOULD_PUBLISH}" = "true" ]; then
            if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
              echo "Missing DOCKERHUB_USERNAME secret" >&2
              exit 1
            fi
            if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "Missing DOCKERHUB_TOKEN secret" >&2
              exit 1
            fi
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/yloader" >> "$GITHUB_OUTPUT"
          else
            echo "name=local/yloader" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.SHOULD_PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
